name: smartmeal
description: Smart recipe app with fridge scanner and deal finder

publish_to: 'none'

version: 1.0.0+3

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3
  
  # Navigation
  go_router: ^13.0.0
  
  # Camera & Image
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  mobile_scanner: ^6.0.2
  
  # HTTP & API
  http: ^1.2.0
  dio: ^5.4.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  
  # UI Components
  flutter_animate: ^4.3.0
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.9
  lottie: ^3.0.0
  
  # Icons
  iconsax: ^0.0.8
  
  # Utils
  intl: ^0.19.0
  uuid: ^4.3.1

  # File Picker
  file_picker: ^6.1.1

  # Secure Storage
  flutter_secure_storage: ^9.0.0

  # Authentication
  sign_in_with_apple: ^5.0.0

  # Google Fonts
  google_fonts: ^6.1.0

  # Supabase
  supabase_flutter: ^2.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  assets:
    - assets/

flutter_launcher_icons:
  ios: true
  image_path: "assets/SparKoch_Appicon2.0.png"
  remove_alpha_ios: true
